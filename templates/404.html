<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - BusHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="error-page">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
                <i class="fas fa-bus me-2"></i>BusHub
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('index') }}">Home</a>
                <a class="nav-link" href="{{ url_for('user.search') }}">Search Buses</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 text-center">
                <div class="error-content">
                    <i class="fas fa-exclamation-triangle fa-6x text-warning mb-4"></i>
                    <h1 class="display-1 fw-bold text-primary mb-3">404</h1>
                    <h2 class="mb-3">Page Not Found</h2>
                    <p class="lead text-muted mb-4">
                        Oops! The page you're looking for doesn't exist.
                        It might have been moved, deleted, or you entered the wrong URL.
                    </p>

                    <div class="d-grid gap-3 d-md-flex justify-content-md-center mb-4">
                        <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
                            <i class="fas fa-home me-2"></i>Go to Homepage
                        </a>
                        <a href="{{ url_for('user.search') }}" class="btn btn-outline-primary btn-lg">
                            <i class="fas fa-search me-2"></i>Search Buses
                        </a>
                    </div>

                    <!-- Search Box -->
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <h6 class="card-title mb-3">Quick Search</h6>
                            <form class="row g-2" action="{{ url_for('user.search') }}" method="GET">
                                <div class="col-md-5">
                                    <input type="text" class="form-control" name="source" placeholder="From" required>
                                </div>
                                <div class="col-md-5">
                                    <input type="text" class="form-control" name="destination" placeholder="To" required>
                                </div>
                                <div class="col-md-2">
                                    <button type="submit" class="btn btn-success w-100">
                                        <i class="fas fa-search"></i>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Help Links -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <div class="card h-100 border-0 bg-light">
                                <div class="card-body text-center">
                                    <i class="fas fa-question-circle fa-2x text-info mb-2"></i>
                                    <h6>Need Help?</h6>
                                    <a href="{{ url_for('contact') }}" class="btn btn-sm btn-outline-info">
                                        Contact Support
                                    </a>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="card h-100 border-0 bg-light">
                                <div class="card-body text-center">
                                    <i class="fas fa-history fa-2x text-success mb-2"></i>
                                    <h6>My Bookings</h6>
                                    <a href="{{ url_for('user.booking_history') }}" class="btn btn-sm btn-outline-success">
                                        View Bookings
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-3 mt-5">
        <div class="container text-center">
            <p class="mb-0">© 2024 BusHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
